<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>어휘 퀴즈 · 19차시</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--accent:#7c56d6;--accent2:#b79ae8;--sub:#f5a01e;--subd:#cc7d10;--ok:#2bb673;--no:#e2574c;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:#efeafb;font-family:'Noto Sans KR',sans-serif;color:#2b2b2b;padding:16px 10px 60px;
  background-image:linear-gradient(#e6ddf7 1px,transparent 1px),linear-gradient(90deg,#e6ddf7 1px,transparent 1px);background-size:26px 26px;background-attachment:fixed;}
.sheet{max-width:520px;margin:0 auto;background:#fff;border:1px solid #e2d8f5;border-radius:18px;box-shadow:0 8px 28px rgba(124,86,214,.12);overflow:hidden;position:relative;}
.top{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid #f0eafb;background:#fff9e6;}
.toc-btn{border:1.5px solid var(--accent);background:#fff;color:var(--accent);border-radius:14px;padding:5px 12px;font-size:13px;font-weight:700;cursor:pointer;}
.who{font-size:12px;color:#999;} .who b{color:var(--accent);font-size:14px;}
.hero{text-align:center;padding:16px 16px 4px;}
.hero h1{margin:0;font-size:22px;color:var(--accent);}
.hero .sub{color:#8a7fb0;font-size:13px;margin:4px 0 0;}
.progress{display:flex;gap:5px;justify-content:center;padding:8px 0 2px;}
.dot{width:10px;height:10px;border-radius:50%;background:#e0d5f5;}
.dot.done{background:var(--sub);}
.q{display:none;padding:16px;}
.q.active{display:block;}
.qhead{font-size:16px;font-weight:700;color:#4a3f6b;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.qno{background:var(--accent);color:#fff;width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex:none;}
.qimg-wrap{display:flex;justify-content:center;margin-bottom:14px;}
.qimg{width:190px;height:190px;border:3px solid #f5cd8a;border-radius:18px;object-fit:contain;background:#fff;padding:6px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.opts.ox{grid-template-columns:1fr 1fr;}
.opt{border:2px solid var(--accent2);background:#faf7ff;color:#4a3f6b;border-radius:14px;padding:14px;font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s;}
.opt:hover{background:#f0e9fc;}
.opt.correct{background:var(--ok);color:#fff;border-color:var(--ok);}
.opt.wrong{background:var(--no);color:#fff;border-color:var(--no);animation:shakeX .5s;}
.oxbtn{font-size:19px;}
.opts-img{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.optimg{border:2px solid var(--accent2);background:#faf7ff;border-radius:14px;padding:8px;cursor:pointer;transition:.12s;}
.optimg:hover{background:#f0e9fc;}
.optimg-i{width:100%;height:110px;object-fit:contain;}
.optimg.correct{background:var(--ok);border-color:var(--ok);}
.optimg.wrong{background:var(--no);border-color:var(--no);animation:shakeX .5s;}
.match-wrap{display:flex;gap:20px;justify-content:center;}
.mcol{display:flex;flex-direction:column;gap:10px;}
.mrow{display:flex;}
.mleft{border:2px solid var(--accent2);border-radius:12px;padding:5px;background:#faf7ff;cursor:pointer;transition:.12s;}
.mleft.sel{border-color:var(--sub);background:#fff3e0;}
.mleft.matched{border-color:var(--ok);background:#e8f7ef;pointer-events:none;opacity:.7;}
.mimg{width:80px;height:80px;object-fit:contain;display:block;}
.mword{border:2px solid var(--accent2);background:#faf7ff;color:#4a3f6b;border-radius:12px;padding:0 18px;height:92px;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s;}
.mword:hover{background:#f0e9fc;}
.mword.matched{border-color:var(--ok);background:#e8f7ef;color:var(--ok);pointer-events:none;}
.mark{text-align:center;min-height:70px;padding:6px 0 2px;}
.mark .icon{font-size:44px;font-weight:900;line-height:1.1;}
.mark .txt{font-size:17px;font-weight:700;margin-top:2px;}
.mark.o .icon,.mark.o .txt{color:var(--ok);}
.mark.x .icon,.mark.x .txt{color:var(--no);}
.nav{display:flex;justify-content:center;padding:18px 16px 24px;}
.nextbtn{border:none;border-radius:22px;padding:12px 34px;font-size:16px;font-weight:800;background:var(--accent);color:#fff;box-shadow:0 5px 0 #5f3fb0;cursor:pointer;}
.nextbtn:disabled{background:#c9bce8;box-shadow:0 5px 0 #b0a0d8;cursor:not-allowed;}
.result{display:none;text-align:center;padding:30px 20px 40px;}
.result h2{color:var(--accent);font-size:26px;margin:0 0 8px;}
.score{font-size:56px;font-weight:900;color:var(--sub);margin:10px 0;}
.result .msg{color:#8a7fb0;font-size:15px;margin-bottom:20px;}
.retry{border:none;border-radius:22px;padding:12px 30px;font-size:15px;font-weight:800;background:var(--sub);color:#fff;box-shadow:0 5px 0 var(--subd);cursor:pointer;}
.fc{position:fixed;top:0;left:0;width:100vw;height:100vh;pointer-events:none;z-index:50;}
@keyframes shakeX{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(7px)}75%{transform:translateX(-4px)}}
</style></head><body>

<script>
var TOTAL=3;
var cur=0, score=0, answered=false;
// 이름 (어휘 파트 키 재사용)
try{ var nm=localStorage.getItem('vocab_name_ch1')||localStorage.getItem('vocab_name_chx'); if(nm) document.getElementById('nameDisplay').textContent=nm; }catch(e){}
// 진행 점
var prog=document.getElementById('progress');
for(var i=0;i<TOTAL;i++){ var d=document.createElement('div'); d.className='dot'; d.id='dot'+i; prog.appendChild(d); }
function showQ(n){ var qs=document.querySelectorAll('.q'); qs.forEach(function(q,i){ q.classList.toggle('active',i===n); });
  document.getElementById('mark').innerHTML=''; answered=false; document.getElementById('nextBtn').disabled=true;
  document.getElementById('nextBtn').textContent=(n===TOTAL-1)?'결과 보기 🏁':'다음 →'; }
// 폭죽
var fc=document.getElementById('fc'),fx=fc.getContext('2d');function rs(){fc.width=window.innerWidth;fc.height=window.innerHeight;}setTimeout(rs,60);addEventListener('resize',rs);
var P=[],raf=null;
function loop(){fx.clearRect(0,0,fc.width,fc.height);P.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vy+=0.3;p.life--;fx.fillStyle=p.c;fx.fillRect(p.x,p.y,6,6);});P=P.filter(function(p){return p.life>0;});if(P.length)raf=requestAnimationFrame(loop);else fx.clearRect(0,0,fc.width,fc.height);}
function burst(){rs();for(var i=0;i<55;i++)P.push({x:fc.width/2,y:fc.height/2,vx:(Math.random()-.5)*11,vy:(Math.random()-.5)*11,c:'hsl('+(Math.random()*360)+',80%,60%)',life:55});raf=requestAnimationFrame(loop);}
function feedback(ok){ var m=document.getElementById('mark'); m.className='mark '+(ok?'o':'x');
  m.innerHTML = ok ? '<div class="icon">⭕</div><div class="txt">정답! 잘했어요 👍</div>' : '<div class="icon">❌</div><div class="txt">아쉬워요 😢</div>';
  if(ok) burst(); }
// 객관식/OX/역방향 공통 — 맞아야 통과, 틀리면 다시
var firstTry={};  // 문제별 첫 시도 여부 (점수용)
function pick(btn,n){ if(answered) return;
  var correct=btn.getAttribute('data-correct')==='1';
  if(correct){
    answered=true;
    btn.classList.add('correct');
    if(!firstTry['q'+n]) score++;  // 첫 시도에 맞으면 점수
    feedback(true);
    document.getElementById('dot'+(n-1)).classList.add('done');
    document.getElementById('nextBtn').disabled=false;
  } else {
    firstTry['q'+n]=true;  // 한 번이라도 틀리면 점수 제외
    btn.classList.add('wrong');
    feedback(false);
    // 잠깐 뒤 오답 표시 지우고 다시 고르게
    (function(b){ setTimeout(function(){ b.classList.remove('wrong'); document.getElementById('mark').innerHTML=''; }, 900); })(btn);
  }
}
// 짝짓기
var matchSel=null, matchDone=0, matchTotal=0;
function matchPick(wordBtn,n){
  var key=wordBtn.getAttribute('data-key');
  if(!matchSel){ /* 그림 먼저 눌러야 */ return; }
  var ok=(matchSel.getAttribute('data-key')===key);
  if(ok){ matchSel.classList.add('matched'); matchSel.classList.remove('sel'); wordBtn.classList.add('matched'); matchDone++;
    if(matchDone===matchTotal){ if(!firstTry['q'+n]) score++; feedback(true); document.getElementById('dot'+(n-1)).classList.add('done'); document.getElementById('nextBtn').disabled=false; answered=true; }
    matchSel=null;
  } else { firstTry['q'+n]=true; var m=document.getElementById('mark'); m.className='mark x'; m.innerHTML='<div class="icon">❌</div><div class="txt">다시 해볼까요?</div>'; matchSel.classList.remove('sel'); matchSel=null; }
}
function initMatch(){ var mq=document.querySelector('.q[data-type="match"]'); if(!mq) return;
  matchTotal=mq.querySelectorAll('.mleft').length;
  mq.querySelectorAll('.mleft').forEach(function(l){ l.addEventListener('click',function(){ if(l.classList.contains('matched'))return; mq.querySelectorAll('.mleft').forEach(function(x){x.classList.remove('sel');}); l.classList.add('sel'); matchSel=l; }); });
}
function nextQ(){ if(cur<TOTAL-1){ cur++; showQ(cur); } else { showResult(); } }
function showResult(){
  document.querySelectorAll('.q').forEach(function(q){q.classList.remove('active');});
  document.getElementById('mark').innerHTML=''; document.querySelector('.nav').style.display='none'; document.getElementById('progress').style.display='none';
  var r=document.getElementById('result'); r.style.display='block';
  document.getElementById('scoreText').textContent=score+' / '+TOTAL;
  var msg=''; if(score===TOTAL) msg='완벽해요! 최고예요 🌟'; else if(score>=TOTAL*0.6) msg='잘했어요! 조금만 더 🙂'; else msg='다시 한 번 도전해 볼까요? 💪';
  document.getElementById('resultMsg').textContent=msg;
  if(score>=TOTAL*0.6) burst();
}
// 시작
showQ(0); initMatch();
</script></body></html>
