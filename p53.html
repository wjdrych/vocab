<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>어휘(인성) · 53쪽 (냉장고)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#2b2b2b; --line:#f5dde9; --accent:#ef7bab; --accent2:#f6b6d0;
  --paper:#ffffff; --bg:#fdf0f6; --soft:#fcf4f8; --ok:#2bb673; --no:#e2574c; --sub:#f7d84a; --subd:#a8920f;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;background:var(--bg);font-family:'Noto Sans KR',sans-serif;color:var(--ink);padding:16px 10px 60px;
  background-image:linear-gradient(#f5dde9 1px,transparent 1px),linear-gradient(90deg,#f5dde9 1px,transparent 1px);
  background-size:26px 26px;background-attachment:fixed;}
.sheet{max-width:640px;margin:0 auto;background:var(--paper);border:1px solid #f5dde9;border-radius:18px;box-shadow:0 8px 28px rgba(239,123,171,.12);overflow:hidden;position:relative;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid #fce6f0;background:#fffce0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.toc-btn{border:1.5px solid var(--accent);background:#fff;color:var(--accent);border-radius:14px;padding:5px 12px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;}
.toc-btn:hover{background:var(--accent);color:#fff;}
.pagenum{font-size:13px;font-weight:700;color:var(--subd);}
.who{display:flex;align-items:center;gap:7px;font-size:12px;color:#999;}
.who .student-name{font-weight:700;color:var(--accent);font-size:14px;}
.who button{border:1px solid #ddd;background:#fff;border-radius:12px;padding:3px 9px;font-size:11px;cursor:pointer;color:#777;}
.hero{text-align:center;padding:18px 16px 8px;}
.hero h1{margin:0;font-size:22px;color:var(--accent);}
.q-guide{color:#8a7fb0;font-size:14px;margin:4px 0 0;}
.pic-wrap{display:flex;justify-content:center;padding:12px 16px 6px;}
.pic{width:min(320px,80vw);height:min(320px,80vw);border:3px solid #fdf1a0;border-radius:20px;object-fit:contain;background:#fff;padding:8px;}
.answer-img img{width:min(300px,74vw);border:3px solid var(--ok);border-radius:18px;padding:6px;background:#fff;}
.answer-label{display:none;text-align:center;font-size:56px;font-weight:900;color:#fff;background:var(--sub);margin:10px auto 6px;padding:14px 10px;border-radius:18px;max-width:300px;letter-spacing:4px;box-shadow:0 5px 0 var(--subd);}
.controls{display:flex;flex-direction:column;align-items:center;gap:10px;padding:6px 16px 22px;}
.big-btn{border:none;border-radius:26px;padding:14px 34px;font-size:18px;font-weight:800;cursor:pointer;font-family:inherit;}
.btn-mic{background:var(--accent);color:#fff;box-shadow:0 5px 0 #cc5789;}
.btn-mic:active{transform:translateY(2px);box-shadow:0 3px 0 #cc5789;}
.btn-mic.rec{background:var(--no);box-shadow:0 5px 0 #b23b32;}
.result-mark{font-size:80px;font-weight:900;height:96px;display:flex;align-items:center;justify-content:center;transition:.2s;}
.result-mark.o{color:var(--sub);} .result-mark.x{color:var(--no);}
@keyframes shakeX{0%,100%{transform:translateX(0) rotate(0)}15%{transform:translateX(-16px) rotate(-7deg)}30%{transform:translateX(14px) rotate(6deg)}45%{transform:translateX(-12px) rotate(-5deg)}60%{transform:translateX(9px) rotate(4deg)}75%{transform:translateX(-5px) rotate(-2deg)}}
.result-mark.shake{animation:shakeX .55s;}
.cheer{min-height:22px;text-align:center;font-size:15px;font-weight:700;color:var(--accent);}
.heard{font-size:12px;color:#aaa;text-align:center;min-height:16px;}
.page-arrow{position:fixed;top:50%;transform:translateY(-50%);width:44px;height:74px;border:none;border-radius:12px;font-size:32px;color:#fff;background:rgba(239,123,171,.9);cursor:pointer;z-index:5;}
.page-arrow.left{left:8px;} .page-arrow.right{right:8px;}
.page-arrow.disabled{background:rgba(180,180,180,.5);cursor:not-allowed;}
canvas.confetti{position:fixed;inset:0;pointer-events:none;z-index:50;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;}
.modal{background:#fff;border-radius:18px;padding:26px 24px;width:min(340px,90vw);text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.25);}
.modal h3{margin:0 0 14px;color:var(--accent);}
.modal input{width:100%;padding:11px 13px;border:2px solid var(--line);border-radius:12px;font-size:16px;font-family:inherit;}
.modal button{margin-top:14px;border:none;background:var(--accent);color:#fff;border-radius:22px;padding:11px 28px;font-size:16px;font-weight:700;cursor:pointer;}
.err{color:var(--no);font-size:13px;min-height:16px;}
</style></head><body>

    <div class="cheer" id="cheer"></div>
    <div class="heard" id="heard"></div>
  </div>
</div>
<button class="page-arrow left" id="prevBtn" onclick="goPage(-1)">&lsaquo;</button>
<button class="page-arrow right" id="nextBtn" onclick="goPage(1)">&rsaquo;</button>
<canvas class="confetti" id="cf"></canvas>
<div class="modal-bg" id="nameModal">
  <div class="modal"><h3>이름을 알려주세요 😊</h3>
    <input id="nameInput" type="text" placeholder="이름 (예: 김하늘)" maxlength="20">
    <div class="err" id="nameErr"></div>
    <button onclick="saveName()">시작하기</button>
  </div>
</div>
<script>
const PAGE = 53;
const FIRST_PAGE = 1;
const LAST_PAGE = 228;
function pageUrl(n){ return 'p' + n + '.html'; }
const SITE_BASE = 'https://wjdrych.github.io/vocab_insung/';
const ANSWER = { word:'냉장고', accept:['냉장고','냉장 고','냉장고요'] };
const CH_RANGES = {1:[1,16],2:[17,45],3:[46,54],4:[55,79],5:[80,99],6:[100,121],7:[122,128],8:[129,154],9:[155,176],10:[177,200],11:[201,212],12:[213,221],13:[222,228]};
function getChParam(){ const m=location.search.match(/[?&]ch=(\d+)/); return m?parseInt(m[1],10):null; }
const CH = getChParam();
const NAME_KEY = 'vocab_insung_name_ch' + (CH || 'x');
function chapterOfPage(p){ for(const k in CH_RANGES){ if(p>=CH_RANGES[k][0]&&p<=CH_RANGES[k][1]) return parseInt(k,10);} return null; }
function goToc(){ const c=CH||chapterOfPage(PAGE); location.href='index2.html'+(c?('?ch='+c):''); }
const CH_LO=(CH&&CH_RANGES[CH])?CH_RANGES[CH][0]:FIRST_PAGE;
const CH_HI=(CH&&CH_RANGES[CH])?CH_RANGES[CH][1]:LAST_PAGE;
function pageUrlCh(n){ return pageUrl(n)+(CH?('?ch='+CH):''); }
const CH_QUIZ_MAP={1:'1q',2:'2q',3:'4q',4:'5q',5:'6q',6:'7q',7:'8q',8:null,9:'9q',10:'10q',11:'11q',12:'12q'};
  const CH_QUIZ=(CH&&CH_QUIZ_MAP[CH])?CH_QUIZ_MAP[CH]:null;
  function goPage(dir){ const t=PAGE+dir; if(t>CH_HI){ if(CH_QUIZ){ location.href=CH_QUIZ+".html?ch="+CH; } return; } if(t<CH_LO) return; location.href=pageUrlCh(t); }
(function(){ const prev=document.getElementById('prevBtn'),next=document.getElementById('nextBtn');
  if(PAGE<=CH_LO) prev.classList.add('disabled'); if(PAGE>=CH_HI) next.classList.add('disabled'); })();
document.addEventListener('DOMContentLoaded',function(){ var pn=document.getElementById('pageNum'); if(pn) pn.textContent=PAGE+'쪽'; });

let studentName='';
function openNameModal(){ document.getElementById('nameInput').value=studentName; document.getElementById('nameErr').textContent=''; document.getElementById('nameModal').style.display='flex'; }
function saveName(){ const v=document.getElementById('nameInput').value.trim(); if(!v){ document.getElementById('nameErr').textContent='이름을 입력해 주세요.'; return; }
  studentName=v; try{localStorage.setItem(NAME_KEY,v);}catch(e){} document.getElementById('nameDisplay').textContent=v; document.getElementById('nameModal').style.display='none'; }
document.getElementById('nameInput').addEventListener('keydown',function(e){ if(e.key==='Enter') saveName(); });
(function(){ try{ var n=localStorage.getItem(NAME_KEY); if(n){ studentName=n; document.getElementById('nameDisplay').textContent=n; }
  else { document.getElementById('nameInput').value=''; document.getElementById('nameModal').style.display='flex'; setTimeout(function(){document.getElementById('nameInput').focus();},100);} }catch(e){} })();

const cf=document.getElementById('cf'), cx=cf.getContext('2d'); let parts=[];
function resizeCf(){ cf.width=innerWidth; cf.height=innerHeight; } resizeCf(); addEventListener('resize',resizeCf);
function burst(){ for(let i=0;i<90;i++){ parts.push({x:innerWidth/2,y:innerHeight*0.35,vx:(Math.random()-0.5)*9,vy:(Math.random()-1)*10,c:'hsl('+(Math.random()*360)+',80%,60%)',life:65}); } requestAnimationFrame(anim); }
function anim(){ cx.clearRect(0,0,cf.width,cf.height); parts.forEach(function(p){ p.x+=p.vx;p.y+=p.vy;p.vy+=0.28;p.life--; cx.fillStyle=p.c; cx.fillRect(p.x,p.y,7,7);}); parts=parts.filter(function(p){return p.life>0;}); if(parts.length) requestAnimationFrame(anim); else cx.clearRect(0,0,cf.width,cf.height); }

let koVoice=null;
function pickVoice(){ const vs=speechSynthesis.getVoices(); koVoice=vs.find(function(v){return v.lang&&v.lang.toLowerCase().startsWith('ko');})||null; }
if('speechSynthesis' in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(t){ if(!('speechSynthesis' in window))return; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='ko-KR'; u.rate=0.9; if(koVoice)u.voice=koVoice; speechSynthesis.speak(u); }

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let recog=null, recording=false, wrongCount=0, solved=false;
function normalize(s){ return (s||'').replace(/\s|[.?!,]/g,''); }
function isCorrect(alts){ const ok=new Set([normalize(ANSWER.word)].concat(ANSWER.accept.map(normalize))); return alts.some(function(a){return ok.has(normalize(a));}); }
function showMark(type){ const m=document.getElementById('mark'); m.textContent=type==='o'?'⭕':'❌';
  m.classList.remove('shake'); void m.offsetWidth; m.className='result-mark '+type;
  if(type==='x'){ void m.offsetWidth; m.classList.add('shake'); }
  setTimeout(function(){ if(!solved){ m.textContent=''; m.classList.remove('shake'); } },1400); }
function showLabeled(){ var al=document.getElementById('answerLabel'); al.style.display='block'; al.textContent=ANSWER.word; var ai=document.getElementById('answerImg'); if(ai) ai.style.display='none'; }
function revealAnswer(){ showLabeled(); document.getElementById('cheer').textContent='정답은 「'+ANSWER.word+'」이에요!'; speak(ANSWER.word); }
function onResult(alts){
  document.getElementById('heard').textContent='들린 말: '+alts.slice(0,3).join(', ');
  if(isCorrect(alts)){ solved=true; const m=document.getElementById('mark'); m.textContent='⭕'; m.className='result-mark o';
    showLabeled();
    document.getElementById('cheer').textContent=(studentName?studentName+'님, ':'')+'정답이에요! 🎉'; burst(); speak(ANSWER.word);
  } else {
    wrongCount++; showMark('x');
    if(wrongCount>=2){ document.getElementById('cheer').textContent='다시 도전! 정답을 보여줄게요 👀'; revealAnswer(); }
    else { document.getElementById('cheer').textContent='다시 한 번 말해 볼까요? 🙂'; }
  }
}
function toggleMic(){
  if(!SR){ document.getElementById('cheer').textContent='이 브라우저는 음성인식을 지원하지 않아요. Chrome을 써주세요.'; return; }
  if(recording){ recog&&recog.stop(); return; }
  recog=new SR(); recog.lang='ko-KR'; recog.interimResults=false; recog.maxAlternatives=5;
  const b=document.getElementById('micBtn');
  recog.onstart=function(){ recording=true; b.classList.add('rec'); b.textContent='🎙️ 듣는 중...'; document.getElementById('cheer').textContent='말해 보세요!'; };
  recog.onerror=function(){ document.getElementById('cheer').textContent='소리가 안 들려요. 다시 눌러 주세요.'; };
  recog.onend=function(){ recording=false; b.classList.remove('rec'); b.textContent='🎤 정답 말하기'; };
  recog.onresult=function(e){ const alts=[]; for(let i=0;i<e.results[0].length;i++) alts.push(e.results[0][i].transcript); onResult(alts); };
  recog.start();
}
</script>
</body></html>
